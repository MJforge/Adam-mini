# Throughput test config for Llama 2-7B
# Reproducing Table 2 of Adam-mini (ICLR 2025)
# Environment: 2x A100-80GB

[job]
dump_folder = "./outputs"
description = "Llama2 7B throughput test"

[profiling]
enable_profiling = false
save_traces_folder = "profile_trace"
profile_freq = 100

[metrics]
log_freq = 1
enable_tensorboard = false
save_tb_folder = "tb"
enable_color_printing = false
enable_wandb = false
wandb_comment = ""

[model]
name = "llama2"
flavor = "7B"
norm_type = "fused_rmsnorm"
tokenizer_path = "./torchtitan/datasets/tokenizer/tokenizer.model"

[optimizer]
name = "AdamW"
lr = 3e-4

[training]
batch_size = 1
seq_len = 2048
warmup_steps = 5
max_norm = 1.0
steps = 30
data_parallel_degree = -1
tensor_parallel_degree = 1
fp8_linear = ""
compile = false
dataset = "c4_mini"
dataset_path = "./torchtitan/datasets/c4_mini/"
grad_accumulation_steps = 1

[experimental]
pipeline_parallel_degree = 1

[checkpoint]
enable_checkpoint = false
folder = "outputs/checkpoint"
interval_type = "steps"
interval = 50000000
model_weights_only = false
export_dtype = "float32"
async_mode = "disabled"

[activation_checkpoint]
mode = "none"
selective_ac_option = "op"
